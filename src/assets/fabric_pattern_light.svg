<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Base tone -->
  <rect width="512" height="512" fill="#f3ede3"/>

  <!-- Organic noise (base fiber variation) -->
  <filter id="baseNoise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="8" stitchTiles="stitch"/>
    <feColorMatrix type="matrix" values="
      0 0 0 0 0.55
      0 0 0 0 0.52
      0 0 0 0 0.47
      0 0 0 0.12 0"/>
  </filter>
  <rect width="512" height="512" filter="url(#baseNoise)" opacity="0.35"/>

  <!-- Warped fiber threads (horizontal-ish) -->
  <filter id="warpH">
    <feTurbulence type="fractalNoise" baseFrequency="0.015 0.25" numOctaves="2" seed="3" stitchTiles="stitch"/>
    <feDisplacementMap in="SourceGraphic" scale="18"/>
  </filter>

  <pattern id="fibersH" width="32" height="32" patternUnits="userSpaceOnUse">
    <rect width="32" height="32" fill="none"/>
    <!-- irregular strokes instead of straight lines -->
    <path d="M-5 6 C 10 4, 22 10, 40 6" stroke="#ded6c7" stroke-width="1.2" fill="none"/>
    <path d="M-5 18 C 12 16, 25 22, 40 18" stroke="#e8e1d4" stroke-width="1" fill="none"/>
    <path d="M-5 28 C 8 26, 20 30, 40 28" stroke="#d8cfbf" stroke-width="0.8" fill="none"/>
  </pattern>

  <rect width="512" height="512" fill="url(#fibersH)" filter="url(#warpH)" opacity="0.6"/>

  <!-- Warped fiber threads (vertical-ish) -->
  <filter id="warpV">
    <feTurbulence type="fractalNoise" baseFrequency="0.25 0.015" numOctaves="2" seed="11" stitchTiles="stitch"/>
    <feDisplacementMap in="SourceGraphic" scale="18"/>
  </filter>

  <pattern id="fibersV" width="32" height="32" patternUnits="userSpaceOnUse">
    <rect width="32" height="32" fill="none"/>
    <path d="M6 -5 C 4 10, 10 22, 6 40" stroke="#e3dbcd" stroke-width="1.1" fill="none"/>
    <path d="M18 -5 C 16 12, 22 26, 18 40" stroke="#dcd3c3" stroke-width="0.9" fill="none"/>
    <path d="M28 -5 C 26 8, 30 20, 28 40" stroke="#efe7d9" stroke-width="0.8" fill="none"/>
  </pattern>

  <rect width="512" height="512" fill="url(#fibersV)" filter="url(#warpV)" opacity="0.55"/>

  <!-- Fine grain detail -->
  <filter id="fineNoise">
    <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="2" seed="21" stitchTiles="stitch"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.05"/>
    </feComponentTransfer>
  </filter>

  <rect width="512" height="512" filter="url(#fineNoise)" opacity="0.25"/>

</svg>